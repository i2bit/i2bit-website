<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i2bit</title>
    <style>
        /* Basis-Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            color: #1d1d1f;
            background-color: #f5f5f7;
            line-height: 1.6;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 48px;
            background-color: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .logo {
            font-size: 21px;
            font-weight: 600;
            color: #0066cc;
            text-decoration: none;
        }

        .content {
            padding: 80px 20px;
            max-width: 980px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            color: #86868b;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            background-color: #f5f5f7;
            color: #86868b;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <header>
        <a href="../index.html" class="logo">i2bit</a>
    </header>

    <div class="content">
        <section class="hero">
            <h1 id="page-title">Titel der Seite</h1>
            <p id="page-description">Beschreibung der Seite</p>
        </section>
    </div>

    <footer>
        &copy; 2025 i2bit GmbH. Alle Rechte vorbehalten.
    </footer>

    <script>
        // Funktion, um URL-Parameter auszulesen
        function getQueryParams() {
            const params = {};
            const queryString = window.location.search;
            const urlParams = new URLSearchParams(queryString);

            urlParams.forEach((value, key) => {
                params[key] = value;
            });

            return params;
        }

        // Dynamische Inhalte basierend auf URL-Parametern setzen
        document.addEventListener('DOMContentLoaded', () => {
            const params = getQueryParams();

            // Titel und Beschreibung aus den Parametern setzen
            const pageTitle = params.title || "Standardtitel";
            const pageDescription = params.description || "Standardbeschreibung";

            document.getElementById('page-title').textContent = pageTitle;
            document.getElementById('page-description').textContent = pageDescription;
        });
    </script>
</body>

</html>
